  function b64decode(s) {
    var bin = atob(s);
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function deriveKey(password, salt, iters) {
    return crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password),
      { name: "PBKDF2" }, false, ["deriveKey"]
    ).then(function (baseKey) {
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: iters, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false, ["decrypt"]
      );
    });
  }

  function tryUnlock(password) {
    var salt = b64decode(PAYLOAD.salt);
    var iv   = b64decode(PAYLOAD.iv);
    var ct   = b64decode(PAYLOAD.ct);
    return deriveKey(password, salt, PAYLOAD.iters).then(function (key) {
      return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    }).then(function (ptBuf) {
      return new TextDecoder("utf-8").decode(ptBuf);
    });
  }

  function injectDecrypted(html) {
    document.open();
    document.write(html);
    document.close();
  }

  var gate = document.getElementById("gate");
  var form = document.getElementById("gate-form");
  var pw   = document.getElementById("pw");
  var btn  = document.getElementById("gate-go");
  var err  = document.getElementById("gate-err");
  var origLabel = btn.textContent;

  // ---- Auto-unlock on load if a working password is cached ----
  var cached = null;
  try { cached = localStorage.getItem(STORAGE_KEY); } catch (e) { /* private mode */ }
  if (cached) {
    gate.classList.add("is-checking");
    tryUnlock(cached).then(injectDecrypted).catch(function () {
      // Cached password no longer works (rotated). Drop it and show the form.
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      gate.classList.remove("is-checking");
      pw.focus();
    });
  }

  // ---- Manual unlock ----
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "Unlocking…";
    var entered = pw.value;
    tryUnlock(entered).then(function (html) {
      // Persist the password for subsequent visits / refreshes
      try { localStorage.setItem(STORAGE_KEY, entered); } catch (e) {}
      injectDecrypted(html);
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = origLabel;
      err.textContent = "That password didn't work. Try again.";
      pw.focus(); pw.select();
    });
  });
})();
</script>

</body>
</html>
