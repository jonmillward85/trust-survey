  function b64decode(s) {
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function deriveKey(password, salt, iters) {
    const baseKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password),
      { name: "PBKDF2" }, false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: iters, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false, ["decrypt"]
    );
  }

  async function tryUnlock(password) {
    const salt = b64decode(PAYLOAD.salt);
    const iv   = b64decode(PAYLOAD.iv);
    const ct   = b64decode(PAYLOAD.ct);
    const key  = await deriveKey(password, salt, PAYLOAD.iters);
    const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    return new TextDecoder("utf-8").decode(ptBuf);
  }

  const form = document.getElementById("gate-form");
  const pw   = document.getElementById("pw");
  const btn  = document.getElementById("gate-go");
  const err  = document.getElementById("gate-err");
  const orig = btn.textContent;

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "Unlocking…";
    try {
      const html = await tryUnlock(pw.value);
      document.open();
      document.write(html);
      document.close();
    } catch (ex) {
      btn.disabled = false;
      btn.textContent = orig;
      err.textContent = "That password didn't work. Try again.";
      pw.focus(); pw.select();
    }
  });
})();
